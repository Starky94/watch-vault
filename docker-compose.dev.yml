services:
  db:
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: ["npm", "run", "server:watch"]
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - api-node-modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"

  web:
    profiles: ["prod"]

  web-dev:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "8080", "--strictPort"]
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      VITE_API_PROXY_TARGET: http://api:3001

  importer:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    volumes:
      - .:/app
      - api-node-modules:/app/node_modules

  importer-upcoming:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    volumes:
      - .:/app
      - api-node-modules:/app/node_modules

volumes:
  api-node-modules:
  web-node-modules:
