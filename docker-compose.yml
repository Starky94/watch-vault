      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/watchvault}
      IMPORT_COMMAND: ${IMPORT_BOOKS_COMMAND:-npm run import:books}
      IMPORT_INTERVAL_SECONDS: ${IMPORT_BOOKS_INTERVAL_SECONDS:-3600}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

  importer-now-playing:
