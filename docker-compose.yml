      IMPORT_INTERVAL_SECONDS: ${IMPORT_NOW_PLAYING_INTERVAL_SECONDS:-86400}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

  importer-tv-airing-today:
