services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-watchvault}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-watchvault}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/watchvault}
      PORT: ${PORT:-3001}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

  importer:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    command: ["./docker/api/importer-loop.sh"]
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/watchvault}
      IMPORT_COMMAND: ${IMPORT_COMMAND:-npm run import:movies}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

  importer-tv-popular:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    command: ["./docker/api/importer-loop.sh"]
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/watchvault}
      IMPORT_COMMAND: ${IMPORT_TV_POPULAR_COMMAND:-npm run import:tv-popular}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

  importer-books:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    command: ["./docker/api/importer-loop.sh"]
    env_file:
      - ${APP_ENV_FILE:-.env}
